# Add this location block inside the existing tools.cuny.qzz.io server block.
# Do NOT replace the entire nginx config — just add this block.
# Note: X-Forwarded-Proto is hardcoded to https because Cloudflare terminates SSL
# and forwards HTTP to nginx, so $scheme would incorrectly be "http".

location /manifold-companion/ {
    proxy_pass http://127.0.0.1:3003/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_cache_bypass $http_upgrade;

    # SSE streaming support for OCR
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header X-Accel-Buffering no;

    proxy_read_timeout 300s;
    client_max_body_size 50M;
}
